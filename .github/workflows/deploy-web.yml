name: Deploy Web App

on:
  push:
    branches:
      - master
    paths-ignore:
      - '*.md'
      - 'design-assets/**'
      - 'score.jpg'
      - 'src-tauri/**'

  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: write

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install

      - name: Build for web
        run: npx vite build --base /neis-cutscore-releases/
        env:
          NODE_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.RELEASE_PAT }}
          external_repository: shinnanchanguk/neis-cutscore-releases
          publish_branch: gh-pages
          publish_dir: ./dist
