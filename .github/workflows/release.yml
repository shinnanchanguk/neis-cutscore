name: Release

on:
  push:
    branches:
      - master
    paths-ignore:
      - '*.md'
      - 'design-assets/**'
      - 'score.jpg'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Step 1: Auto bump version + create tag
  version-and-tag:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
      release_id: ${{ steps.create-release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read current version from tauri.conf.json
          CURRENT=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9]*\.[0-9]*\.[0-9]*\)".*/\1/')
          echo "Current version: $CURRENT"

          # Split into major.minor.patch and bump patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          # Update tauri.conf.json
          sed -i "s/\"version\": \"$CURRENT\"/\"version\": \"$NEW_VERSION\"/" src-tauri/tauri.conf.json

          # Commit and tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json
          git commit -m "release: v${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin master --tags

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: v${{ steps.bump.outputs.new_version }}
          draft: true
          prerelease: false
          generate_release_notes: true

  # Step 2: Build on all platforms
  build-tauri:
    needs: version-and-tag
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--bundles nsis'
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version-and-tag.outputs.new_version }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.version-and-tag.outputs.release_id }}
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

  # Step 3: Publish to both repos
  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [version-and-tag, build-tauri]
    steps:
      - name: Publish private release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.version-and-tag.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
            });

      - name: Download private release assets
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.version-and-tag.outputs.release_id }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = 'release-assets';
            fs.mkdirSync(dir, { recursive: true });

            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
            });

            for (const asset of assets) {
              console.log(`Downloading: ${asset.name}`);
              const response = await github.rest.repos.getReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
                headers: { accept: 'application/octet-stream' },
              });
              fs.writeFileSync(
                path.join(dir, asset.name),
                Buffer.from(response.data)
              );
            }

      - name: Generate latest.json for updater
        uses: actions/github-script@v7
        env:
          VERSION: ${{ needs.version-and-tag.outputs.new_version }}
          REPO: shinnanchanguk/neis-cutscore-releases
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const version = process.env.VERSION;
            const repo = process.env.REPO;
            const dir = 'release-assets';
            const files = fs.readdirSync(dir);

            // Find signature files
            const findSig = (pattern) => {
              const sigFile = files.find(f => f.includes(pattern) && f.endsWith('.sig'));
              if (!sigFile) return '';
              return fs.readFileSync(path.join(dir, sigFile), 'utf8').trim();
            };

            // Find download URL pattern
            const baseUrl = `https://github.com/${repo}/releases/download/v${version}`;
            const findUrl = (pattern) => {
              const file = files.find(f => f.includes(pattern) && !f.endsWith('.sig'));
              return file ? `${baseUrl}/${file}` : '';
            };

            const now = new Date().toISOString();
            const latest = {
              version: `v${version}`,
              notes: `v${version} release`,
              pub_date: now,
              platforms: {}
            };

            // Windows NSIS
            const nsisFile = files.find(f => f.includes('x64-setup') && f.endsWith('.nsis.zip'));
            const nsisExe = files.find(f => f.includes('x64-setup.exe') && !f.endsWith('.sig'));
            const nsisSig = files.find(f => f.includes('nsis.zip.sig'));
            if (nsisFile && nsisSig) {
              latest.platforms['windows-x86_64'] = {
                signature: fs.readFileSync(path.join(dir, nsisSig), 'utf8').trim(),
                url: `${baseUrl}/${nsisFile}`
              };
            } else if (nsisExe) {
              // Fallback: use .exe.sig
              const exeSig = files.find(f => f.includes('x64-setup.exe.sig'));
              if (exeSig) {
                latest.platforms['windows-x86_64'] = {
                  signature: fs.readFileSync(path.join(dir, exeSig), 'utf8').trim(),
                  url: `${baseUrl}/${nsisExe}`
                };
              }
            }

            // macOS
            const macArm = files.find(f => f.includes('aarch64.app.tar.gz') && !f.endsWith('.sig'));
            const macArmSig = files.find(f => f.includes('aarch64.app.tar.gz.sig'));
            if (macArm && macArmSig) {
              latest.platforms['darwin-aarch64'] = {
                signature: fs.readFileSync(path.join(dir, macArmSig), 'utf8').trim(),
                url: `${baseUrl}/${macArm}`
              };
            }

            const macX64 = files.find(f => f.includes('x64.app.tar.gz') && !f.endsWith('.sig'));
            const macX64Sig = files.find(f => f.includes('x64.app.tar.gz.sig'));
            if (macX64 && macX64Sig) {
              latest.platforms['darwin-x86_64'] = {
                signature: fs.readFileSync(path.join(dir, macX64Sig), 'utf8').trim(),
                url: `${baseUrl}/${macX64}`
              };
            }

            // Linux
            const linuxAppImage = files.find(f => f.includes('AppImage') && !f.endsWith('.sig'));
            const linuxSig = files.find(f => f.includes('AppImage') && f.endsWith('.sig'));
            if (linuxAppImage && linuxSig) {
              latest.platforms['linux-x86_64'] = {
                signature: fs.readFileSync(path.join(dir, linuxSig), 'utf8').trim(),
                url: `${baseUrl}/${linuxAppImage}`
              };
            }

            console.log('latest.json:', JSON.stringify(latest, null, 2));
            fs.writeFileSync(path.join(dir, 'latest.json'), JSON.stringify(latest, null, 2));

      - name: Publish to public releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: shinnanchanguk/neis-cutscore-releases
          tag_name: v${{ needs.version-and-tag.outputs.new_version }}
          name: "NEIS 분할점수 계산기 v${{ needs.version-and-tag.outputs.new_version }}"
          body: |
            ## NEIS 분할점수 계산기 v${{ needs.version-and-tag.outputs.new_version }}

            ### 다운로드
            - **Windows**: `.exe` 파일 다운로드 후 실행
            - **macOS**: `.dmg` 파일 다운로드 후 설치
            - **Linux**: `.AppImage` 또는 `.deb` 다운로드

            설치 후 앱 내에서 자동 업데이트가 지원됩니다.

            Made by DoRm
          files: release-assets/*
          token: ${{ secrets.RELEASE_PAT }}
