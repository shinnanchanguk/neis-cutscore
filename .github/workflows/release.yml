name: Release

on:
  push:
    branches:
      - master
    paths-ignore:
      - '*.md'
      - 'design-assets/**'
      - 'score.jpg'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version-and-tag:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9]*\.[0-9]*\.[0-9]*\)".*/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping $CURRENT -> $NEW_VERSION"

          sed -i "s/\"version\": \"$CURRENT\"/\"version\": \"$NEW_VERSION\"/" src-tauri/tauri.conf.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json
          git commit -m "release: v${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin master --tags

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

  build-tauri:
    needs: version-and-tag
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--bundles nsis'
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version-and-tag.outputs.new_version }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build ${{ matrix.args }}

      - name: Collect bundle files
        shell: python3 {0}
        env:
          BUILD_ARGS: ${{ matrix.args }}
        run: |
          import os, shutil
          os.makedirs('upload', exist_ok=True)
          exts = ('-setup.exe', '-setup.exe.sig', '.nsis.zip', '.nsis.zip.sig',
                  '.dmg', '.app.tar.gz', '.app.tar.gz.sig', '.AppImage', '.AppImage.sig',
                  '.deb', '.rpm')
          # Detect target arch from build args
          args = os.environ.get('BUILD_ARGS', '')
          arch_prefix = ''
          if 'aarch64' in args:
              arch_prefix = '_aarch64'
          elif 'x86_64' in args:
              arch_prefix = '_x64'
          for root, dirs, files in os.walk('src-tauri/target'):
              for f in files:
                  if any(f.endswith(ext) for ext in exts):
                      src = os.path.join(root, f)
                      # Add arch to .app.tar.gz files that lack it (macOS cross-compile)
                      out_name = f
                      if arch_prefix and '.app.tar.gz' in f and 'aarch64' not in f and 'x64' not in f:
                          base = f.split('.app.tar.gz')[0]
                          suffix = '.app.tar.gz' + f.split('.app.tar.gz')[1] if '.sig' in f else '.app.tar.gz'
                          if f.endswith('.app.tar.gz.sig'):
                              out_name = f'{base}{arch_prefix}.app.tar.gz.sig'
                          else:
                              out_name = f'{base}{arch_prefix}.app.tar.gz'
                      shutil.copy2(src, os.path.join('upload', out_name))
                      print(f'  {out_name}')

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}-${{ strategy.job-index }}
          path: upload/
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: [version-and-tag, build-tauri]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: bundles-*
          merge-multiple: true

      - name: Generate latest.json and prepare release
        uses: actions/github-script@v7
        env:
          VERSION: ${{ needs.version-and-tag.outputs.new_version }}
          REPO: shinnanchanguk/neis-cutscore-releases
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const version = process.env.VERSION;
            const repo = process.env.REPO;
            const baseUrl = `https://github.com/${repo}/releases/download/v${version}`;
            const srcDir = 'all-artifacts';
            const outDir = 'release-files';
            fs.mkdirSync(outDir, { recursive: true });

            // Flatten nested artifact dirs
            function collect(dir) {
              for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, e.name);
                if (e.isDirectory()) collect(full);
                else { fs.copyFileSync(full, path.join(outDir, e.name)); console.log(e.name); }
              }
            }
            collect(srcDir);
            const files = fs.readdirSync(outDir);

            // Read .sig content
            const readSig = (name) => {
              const p = path.join(outDir, name + '.sig');
              return fs.existsSync(p) ? fs.readFileSync(p, 'utf8').trim() : '';
            };

            // Build latest.json
            const latest = { version: `v${version}`, notes: `v${version}`, pub_date: new Date().toISOString(), platforms: {} };

            // Windows: prefer .nsis.zip, fallback to -setup.exe
            const nsisZip = files.find(f => f.endsWith('.nsis.zip'));
            const setupExe = files.find(f => f.endsWith('-setup.exe'));
            if (nsisZip && readSig(nsisZip)) {
              latest.platforms['windows-x86_64'] = { signature: readSig(nsisZip), url: `${baseUrl}/${nsisZip}` };
            } else if (setupExe && readSig(setupExe)) {
              latest.platforms['windows-x86_64'] = { signature: readSig(setupExe), url: `${baseUrl}/${setupExe}` };
            }

            const macArm = files.find(f => f.includes('aarch64') && f.endsWith('.app.tar.gz'));
            if (macArm && readSig(macArm)) latest.platforms['darwin-aarch64'] = { signature: readSig(macArm), url: `${baseUrl}/${macArm}` };

            const macX64 = files.find(f => f.includes('x64') && f.endsWith('.app.tar.gz'));
            if (macX64 && readSig(macX64)) latest.platforms['darwin-x86_64'] = { signature: readSig(macX64), url: `${baseUrl}/${macX64}` };

            const linux = files.find(f => f.endsWith('.AppImage'));
            if (linux && readSig(linux)) latest.platforms['linux-x86_64'] = { signature: readSig(linux), url: `${baseUrl}/${linux}` };

            console.log('latest.json:', JSON.stringify(latest, null, 2));
            fs.writeFileSync(path.join(outDir, 'latest.json'), JSON.stringify(latest, null, 2));

            // Remove internal files not needed for user download
            for (const f of files) {
              if (f.endsWith('.sig') || f.endsWith('.msi') || f.endsWith('.msi.zip') || f.endsWith('.nsis.zip')) {
                fs.unlinkSync(path.join(outDir, f));
              }
            }

      - name: Publish to public releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: shinnanchanguk/neis-cutscore-releases
          tag_name: v${{ needs.version-and-tag.outputs.new_version }}
          name: "추정 분할 점수 계산기 v${{ needs.version-and-tag.outputs.new_version }}"
          body: |
            ## 추정 분할 점수 계산기 v${{ needs.version-and-tag.outputs.new_version }}

            ### 다운로드
            - **Windows**: `.exe` 파일 다운로드 후 실행
            - **macOS**: `.dmg` 파일 다운로드 후 설치
            - **Linux**: `.AppImage` 또는 `.deb` 다운로드

            설치 후 앱 내에서 자동 업데이트가 지원됩니다.

            Made by DoRm
          files: release-files/*
          token: ${{ secrets.RELEASE_PAT }}
