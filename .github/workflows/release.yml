name: Release

on:
  push:
    branches:
      - master
    paths-ignore:
      - '*.md'
      - 'design-assets/**'
      - 'score.jpg'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Step 1: Auto bump version + create tag
  version-and-tag:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
      release_id: ${{ steps.create-release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read current version from tauri.conf.json
          CURRENT=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9]*\.[0-9]*\.[0-9]*\)".*/\1/')
          echo "Current version: $CURRENT"

          # Split into major.minor.patch and bump patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          # Update tauri.conf.json
          sed -i "s/\"version\": \"$CURRENT\"/\"version\": \"$NEW_VERSION\"/" src-tauri/tauri.conf.json

          # Commit and tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json
          git commit -m "release: v${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin master --tags

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: v${{ steps.bump.outputs.new_version }}
          draft: true
          prerelease: false
          generate_release_notes: true

  # Step 2: Build on all platforms
  build-tauri:
    needs: version-and-tag
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--bundles nsis'
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version-and-tag.outputs.new_version }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.version-and-tag.outputs.release_id }}
          updaterJsonPreferNsis: true
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Find and upload sig files
        shell: python3 {0}
        run: |
          import os, shutil, glob
          os.makedirs('sig-upload', exist_ok=True)
          count = 0
          for root, dirs, files in os.walk('src-tauri/target'):
            for f in files:
              if f.endswith('.sig'):
                src = os.path.join(root, f)
                dst = os.path.join('sig-upload', f)
                shutil.copy2(src, dst)
                print(f'Copied: {src} -> {dst}')
                count += 1
          print(f'Total sig files: {count}')

      - name: Upload sig files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sigs-${{ matrix.platform }}-${{ strategy.job-index }}
          path: sig-upload/
          if-no-files-found: ignore

  # Step 3: Publish to both repos
  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [version-and-tag, build-tauri]
    steps:
      - name: Publish private release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.version-and-tag.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
            });

      - name: Download sig artifacts
        uses: actions/download-artifact@v4
        with:
          path: sig-artifacts
          pattern: sigs-*
          merge-multiple: true

      - name: Download private release assets
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.version-and-tag.outputs.release_id }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = 'release-assets';
            fs.mkdirSync(dir, { recursive: true });

            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
            });

            for (const asset of assets) {
              console.log(`Downloading: ${asset.name}`);
              const response = await github.rest.repos.getReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
                headers: { accept: 'application/octet-stream' },
              });
              fs.writeFileSync(
                path.join(dir, asset.name),
                Buffer.from(response.data)
              );
            }

      - name: Generate latest.json for updater
        uses: actions/github-script@v7
        env:
          VERSION: ${{ needs.version-and-tag.outputs.new_version }}
          REPO: shinnanchanguk/neis-cutscore-releases
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const version = process.env.VERSION;
            const repo = process.env.REPO;
            const assetDir = 'release-assets';
            const sigDir = 'sig-artifacts';
            const baseUrl = `https://github.com/${repo}/releases/download/v${version}`;
            const assets = fs.readdirSync(assetDir);

            // Recursively find all .sig files from artifacts
            function findSigFiles(dir) {
              const results = [];
              if (!fs.existsSync(dir)) return results;
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) results.push(...findSigFiles(full));
                else if (entry.name.endsWith('.sig')) results.push(full);
              }
              return results;
            }
            const sigFiles = findSigFiles(sigDir);
            console.log('Found sig files:', sigFiles.map(f => path.basename(f)));

            const readSig = (keyword) => {
              const f = sigFiles.find(s => path.basename(s).includes(keyword));
              return f ? fs.readFileSync(f, 'utf8').trim() : '';
            };

            const findAsset = (keyword) => assets.find(a => a.includes(keyword) && !a.endsWith('.sig'));

            const now = new Date().toISOString();
            const latest = { version: `v${version}`, notes: `v${version}`, pub_date: now, platforms: {} };

            // Windows (NSIS)
            const nsisZipSig = readSig('nsis.zip.sig');
            const nsisExe = findAsset('x64-setup.exe');
            if (nsisZipSig && nsisExe) {
              latest.platforms['windows-x86_64'] = { signature: nsisZipSig, url: `${baseUrl}/${nsisExe}` };
            }

            // macOS ARM
            const macArmSig = readSig('aarch64.app.tar.gz.sig');
            const macArm = findAsset('aarch64.app.tar.gz');
            if (macArmSig && macArm) {
              latest.platforms['darwin-aarch64'] = { signature: macArmSig, url: `${baseUrl}/${macArm}` };
            }

            // macOS Intel
            const macX64Sig = readSig('x64.app.tar.gz.sig');
            const macX64 = findAsset('x64.app.tar.gz');
            if (macX64Sig && macX64) {
              latest.platforms['darwin-x86_64'] = { signature: macX64Sig, url: `${baseUrl}/${macX64}` };
            }

            // Linux
            const linuxSig = readSig('AppImage.sig');
            const linuxApp = findAsset('AppImage');
            if (linuxSig && linuxApp) {
              latest.platforms['linux-x86_64'] = { signature: linuxSig, url: `${baseUrl}/${linuxApp}` };
            }

            console.log('latest.json:', JSON.stringify(latest, null, 2));
            fs.writeFileSync(path.join(assetDir, 'latest.json'), JSON.stringify(latest, null, 2));

      - name: Publish to public releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: shinnanchanguk/neis-cutscore-releases
          tag_name: v${{ needs.version-and-tag.outputs.new_version }}
          name: "NEIS 분할점수 계산기 v${{ needs.version-and-tag.outputs.new_version }}"
          body: |
            ## NEIS 분할점수 계산기 v${{ needs.version-and-tag.outputs.new_version }}

            ### 다운로드
            - **Windows**: `.exe` 파일 다운로드 후 실행
            - **macOS**: `.dmg` 파일 다운로드 후 설치
            - **Linux**: `.AppImage` 또는 `.deb` 다운로드

            설치 후 앱 내에서 자동 업데이트가 지원됩니다.

            Made by DoRm
          files: release-assets/*
          token: ${{ secrets.RELEASE_PAT }}
